<html>
    <head>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Quicksand:wght@500;700&display=swap');
            body{
                margin: 0;
                padding:0;
                overflow: hidden;
                background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=2070&auto=format&fit=crop');
                background-size: cover;
                background-position: center;
                animation: transitionIn 1.5s ease-in-out;
            }
            .overlay{
                top:0%;
                left:0%;
                width: 100%;
                height: 100%;
                background:radial-gradient(circle at center,transparent 10%,rgba(0,0,0,0.8) 100%);
                position: absolute;
                z-index: 1;

            }
            .string{
                width:2px;
                position: relative;
                background-color: gold;
                transform-origin: top center;
                animation: sway var(--speed) ease-in-out infinite alternate;
                background: linear-gradient(to bottom, #ffd700, #fff3b0, #d4af37);
                box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
            }
            .container{
                background-color: white;
                padding: 5px 5px 10px 5px;
                position: absolute; 
                box-shadow: 0px 20px 45px black;
                top: 100%;
                transform: translateX(-50%) rotate(var(--tilt));
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                cursor: pointer;
                border-radius: 2px;
            }
            .container:hover{
                transform:translateX(-50%) rotate(0deg) scale(1.2);
                z-index: 100;
                box-shadow: 0 40px 80px rgba(0,0,0,1);
                outline: 2px solid #ffd700;
            }
            .one{
                width: 100px;
                height: 140px;
                object-fit: cover;
                display: block;
                border-bottom: 1px solid #eee;
            }
            .whole{
                z-index: 2;
                display: flex;
                justify-content: space-evenly;
                align-items: flex-start;
                position: relative;
                height: 90vh;
                
            }
            .next{
                position: fixed;
                left:50%;
                transform: translateX(-50%);
                bottom:30px;
                background:linear-gradient(to right, #ffd700, #fff3b0, #d4af37);
                border: none;
                padding: 12px 30px;
                border-radius: 25px;
                z-index: 2000;
                transition: all 0.4s;
                font-family: 'Dancing Script', cursive;
                font-size: larger;
                height: 70px;
                width: 200px;
            }
            .next:hover{
                transform: translateX(-50%) scale(1.2);
            }
            .text{
                text-align: center;
                margin-bottom: 0;
                margin-top: 0;
            }
            @keyframes sway {
            from { transform: rotate(-3deg); }
            to { transform: rotate(3deg); }
            }
            @keyframes transitionIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px); /* Optional: makes it slide down slightly */
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>

    </head>
    <body>
        <div class="overlay"></div>
        <div class="whole">
            <div class="string" style="--speed :3.1s;height:30vh">
                <div class="container" style="--tilt:-4deg">
                <img src="1.jpg" class="one">
                <p class="text"> 🎮</p>
                </div>
                
            </div>
            <div class="string" style="--speed :3.7s; height: 40vh">
                <div class="container" style="--tilt:2deg">
                <img src="2.jpg" class="one">
                <p class="text">☺️</p>
                </div>
            </div>
            <div class="string" style="--speed :4.1s; height:55vh">
                <div class="container" style="--tilt:4deg">
                <img src="3.jpg" class="one">
                <p class="text">🧘🏻‍♀️</p>
                </div>
            </div>
            <div class="string" style="--speed :3.4s; height: 45vh">
                <div class="container" style="--tilt:-2deg">
                <img src="4.jpg" class="one">
                <p class="text">👯</p>
                </div>
            </div>
            <div class="string" style="--speed :5.0s; height: 30vh">
                <div class="container" style="--tilt:-1deg">
                <img src="5.jpg" class="one">
                <p class="text">✨</p>
                </div>
            </div>
            <div class="string" style="--speed :2.5s; height: 25vh">
                <div class="container" style="--tilt:5deg">
                <img src="6.jpeg" class="one" >
                <p class="text">🤓</p>
                </div>
            </div>
            <div class="string"style="--speed :4.5s; height: 35vh">
                <div class="container" style="--tilt:-3deg">
                <img src="7.jpeg" class="one">
                <p class="text">📚</p>
                </div>
            </div>
            <div class="string" style="--speed :3.2s; height: 38vh">
                <div class="container" style="--tilt:-5deg">
                <img src="8.jpeg" class="one">
                <p class="text"> 🧸</p>
                </div>
            </div>
            <div class="string" style="--speed :2.7s; height: 60vh">
                <div class="container" style="--tilt:4deg">
                <img src="9.jpeg" class="one">
                <p class="text">🥱</p>
                </div>
            </div>
            <div class="string" style="--speed :4.2s; height: 43vh">
                <div class="container" style="--tilt:-1deg">
                <img src="10.jpeg" class="one">
                <p class="text">😴</p>
                </div>
            </div>
            <div class="string" style="--speed :4.7s; height: 48vh">
                <div class="container" style="--tilt:-3deg">
                <img src="11.jpeg" class="one">
                <p class="text">🧙🏻‍♀️</p>
                </div>
            </div>
            <div class="string" style="--speed :3.9s; height: 37vh">
                <div class="container" style="--tilt:2deg">
                <img src="12.jpeg" class="one">
                <p class="text">😋</p>
                </div>
            </div>
            <div class="string" style="--speed :3.7s; height: 20vh">
                <div class="container" style="--tilt:4deg">
                <img src="13.jpeg" class="one">
                <p class="text">⚽️</p>
                </div>
            </div>
            
        </div>
        <audio id="myaudio"> 
            <source src="Ennamo Yeadho.mp3" type="audio/mpeg">
        </audio>
        <a href="text.html">
        <button class="next" onclick="let a=document.getElementById('myaudio');a.play();setTimeout(()=>{location.href='text.html'}, 200);"> SEE   MORE</button>
        </a>
    </body>
</html>
